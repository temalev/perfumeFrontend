services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PUBLIC_API_BASE_URL: https://parfburo.com/api
        NODE_ENV: production
    ports:
      - "3000:3000"
    environment:
      PUBLIC_API_BASE_URL: https://parfburo.com/api
      NODE_ENV: production
      HOST: 0.0.0.0
    restart: unless-stopped
